mode: rule
log-level: info
dns:
  # 默认的域名解析服务器
  nameserver: [223.5.5.5, 119.29.29.29]
  # fake ip 白名单列表'以下地址不会下发fakeip映射用于连接
  fake-ip-filter: ['+.lan', '*', '+.local', '+.cmpassport.com', 'id6.me', 'open.e.189.cn', 'mdn.open.wo.cn', 'opencloud.wostore.cn', 'auth.wosms.cn', '+.10099.com.cn', '+.msftconnecttest.com', '+.msftncsi.com', 'lancache.steamcontent.com']
# > 订阅信息展示
subscribe-url:
# > 远程服务器
proxy-providers:
  聚会:
    interval: 86400
    url: https://Lz
    benchmark-timeout: 5
    benchmark-url: http://1.1.1.1/generate_204
proxy-groups:
  - {name: MyTVSuper, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/myTV_SUPER.png', type: select, proxies: [香港-🇭🇰, 香港故转]}
  - {name: YouTube, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png', type: select, proxies: [美国代理, 美国-🇺🇸, 香港-🇭🇰, 香港故转, 香港节点, 台湾节点, DIRECT]}
  - icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/DomesticMedia.png
    name: 欧飞ofiii
    proxies:
      - 台湾故转
    type: select
  - {name: 国际媒体, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Blinkload.png', type: select, proxies: [香港-🇭🇰, 美国代理, 美国-🇺🇸]}
  - {name: 漏网之鱼, icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png', type: select, proxies: [DIRECT]}
  - name: 香港-🇭🇰
    type: select
    include-all: true
    filter: "(?=.*(AS hy2))^((?!(台|香|日|韩|新|深|美)).)*$"
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Hong_Kong.png
  - name: 美国代理
    type: fallback
    interval: 180
    lazy: null
    proxies:
      - 美国代A
      - 美国代B
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
  - {name: 美国代A, icon: 'https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png', type: select, include-all: true, filter: "(?i)QA|6ff2ac18|(\b(US|United States)\b)"}
  - {name: 美国代B, icon: 'https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png', type: select, include-all: true, filter: "(?i)QA|6ff2ac18|(\b(US|United States)\b)"}
  - name: 美国-🇺🇸
    type: select
    include-all: true
    filter: "(?=.*(QA hy2))^((?!(台|香|日|韩|新|深|美)).)*$"
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
  - name: 香港故转
    type: fallback
    interval: 180
    lazy: null
    proxies:
      - 香港专线
      - 香港节点
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Hong_Kong.png
  - name: 香港专线
    type: fallback
    interval: 180
    lazy: null
    proxies:
      - 香港专 1
      - 香港专 2
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png
  - {name: 香港专 1, icon: 'https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png', type: select, include-all: true, filter: "(?i)香港|🇭🇰|(\b(HK|Hong)\b)"}
  - {name: 香港专 2, icon: 'https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png', type: select, include-all: true, filter: "(?i)香港|🇭🇰|(\b(HK|Hong)\b)"}
  - {name: 香港节点, icon: 'https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png', type: url-test, interval: 300, include-all: true, filter: "(?i)🇭🇰|香港|(\b(HK|Hong)\b)"}
  - name: 台湾故转
    type: fallback
    interval: 180
    lazy: null
    proxies:
      - 台湾专线
      - 台湾节点
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
  - name: 台湾专线
    type: fallback
    interval: 180
    lazy: null
    proxies:
      - 台湾专 A
      - 台湾专 B
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png
  - name: 台湾专 A
    type: select
    include-all: true
    filter: "(?=.*(台湾|TW|Tai|Taiwan)).*$"
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png
  - name: 台湾专 B
    type: select
    include-all: true
    filter: "(?=.*(台湾|TW|Tai|Taiwan)).*$"
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png
  - {name: 台湾节点, icon: 'https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png', type: url-test, interval: 300, include-all: true, filter: "(?i)🇨🇳|🇹🇼|台湾|(\b(TW|Tai|Taiwan)\b)"}
